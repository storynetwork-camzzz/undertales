  <style>
    html {
      background: #444;
      font-family: sans-serif;
    }

    body, html {
      overscroll-behavior: none;
    }

    #canvas, #overlayDiv {
      position: absolute;
      top: 0px;
      left: 0px;

      width: 100%;
      height: 100%;

      border: 0 none;
    }

    #canvas {
      background: #000;
    }

    .visible {
      visibility: visible;
      opacity: 1.0;
      transition: opacity .1s linear;
    }

    .hidden {
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s .25s, opacity .25s linear;
    }

    #statusDiv, #inputDiv {
      background: rgba(0, 0, 0, 0.75);
      width: 50%;
      margin: auto;
      min-width: 340px;
      padding: 10px;

      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      border-radius: 0 0 5px 5px;
    }

    #statusTextDiv {
      overflow: auto;
      max-height: 40vh;
      color: #ccc;
      font-size: 14px;
    }

    #statusProgress {
      display: none;
      width: 100%;
    }

    #inputDiv {
      width: 65%;
      padding-left: 10px;
      padding-right: 20px;
    }

    #inputPrompt {
      color: #eee;
      font-size: 150%;
      margin-bottom: 1em;
      margin-top: 1em;

    }

    #inputText {
      width: 100%;
      font-size: 175%;
      padding: 5px;
      background: inherit;
      color: #eee;
    }

    #inputText:focus {
      color: #ffffff;
    }

    #ContextContainer {
      position: absolute;
      left: 0px;
      top: 0px;
      color: white;
    }

    #ContextContainer.shown {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 0px 0px 5px 0px;
    }

    #ContextButton {
      text-decoration: none;
      color: lightgrey;
      font-size: xx-large;
      cursor: pointer;
      user-select: none;
      -moz-user-select: none;
      padding: 10px 10px;
      opacity: .75;
    }

    #ContextButton:focus {
      outline: none;
      color: #ffffff;
      opacity: 1.0;
    }

    #ContextMenu a {
      text-decoration: none;
      color: lightgrey;
      background: #444;
      height: 48px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid lightgrey;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 5px 5px;
      opacity: 1.0;
    }

    #ContextMenu a:hover {
      text-decoration: none;
      background: #666666;
      color: #ffffff
    }

    #presplash {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        margin: auto;
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    #loading-status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 18px;
      font-family: sans-serif;
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 10px;
      display: none;

</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>
  
  <div id="loading-status">Loading game files...</div>

  <img id="presplash" src="web-presplash.jpg">

  <div id="ContextContainer">
    <a id="ContextButton">&#8801;</a><br />
    <div id="ContextMenu" style="display: none;">
      <input id="ID_SavegamesImport" type="file" onchange="onSavegamesImport(this)" accept="application/zip"
        style=display:none></input>
      <a href="javascript:document.getElementById('ID_SavegamesImport').click();">Import Saves</a>
      <a href="javascript:onSavegamesExport();">Export Saves</a>
      <a href="javascript:FSDownload('/log.txt', 'text/plain');">Download Log</a>
      <a href="https://www.renpy.org/" target="_blank">
          Powered by Ren'Py
      </a>
      </span>
    </div>
  </div>

  <div id="statusDiv" class="hidden">
    <div id="statusTextDiv"></div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>

  <div id="inputDiv" class="hidden">
    <form id="inputForm">
      <div id="inputPrompt"></div>
      <input id="inputText" type="text">
    </form>
  </div>

  <!-- File merging and loading script -->
  <script>
    // Configuration for split files
    const WASM_PARTS = 2; // renpy.wasm split into 2 parts
    const ZIP_PARTS = 2;  // game.zip split into 2 parts
    let mergedWasmBlob = null;
    let mergedZipBlob = null;
    let mergedZipBlobUrl = null;

    // Update loading status
    function updateLoadingStatus(message) {
      const statusElement = document.getElementById('loading-status');
      if (statusElement) {
        statusElement.textContent = message;
        statusElement.style.display = 'block';
      }
    }

    // Hide loading status when done
    function hideLoadingStatus() {
      const statusElement = document.getElementById('loading-status');
      if (statusElement) {
        statusElement.style.display = 'none';
      }
    }

    // Merge WASM files
    async function mergeWasmFiles() {
      try {
        console.log('Merging WASM files...');
        updateLoadingStatus('Loading game engine... (1/3)');
        
        const buffers = [];
        
        for (let i = 1; i <= WASM_PARTS; i++) {
          console.log(`Loading WASM part ${i} of ${WASM_PARTS}`);
          updateLoadingStatus(`Loading game engine... (${i}/${WASM_PARTS})`);
          
          const response = await fetch(`renpy.wasm.part${i}`);
          if (!response.ok) {
            throw new Error(`Failed to load WASM part ${i}: ${response.status}`);
          }
          
          const buffer = await response.arrayBuffer();
          buffers.push(buffer);
        }
        
        // Merge buffers
        const totalLength = buffers.reduce((total, buf) => total + buf.byteLength, 0);
        const mergedBuffer = new Uint8Array(totalLength);
        
        let offset = 0;
        for (const buffer of buffers) {
          mergedBuffer.set(new Uint8Array(buffer), offset);
          offset += buffer.byteLength;
        }
        
        mergedWasmBlob = new Blob([mergedBuffer], { type: 'application/wasm' });
        console.log('WASM files merged successfully');
        
        return mergedWasmBlob;
      } catch (error) {
        console.error('Error merging WASM files:', error);
        throw error;
      }
    }

    // Merge ZIP files
    async function mergeZipFiles() {
      try {
        console.log('Merging ZIP files...');
        updateLoadingStatus('Loading game data... (2/3)');
        
        const buffers = [];
        
        for (let i = 1; i <= ZIP_PARTS; i++) {
          console.log(`Loading ZIP part ${i} of ${ZIP_PARTS}`);
          updateLoadingStatus(`Loading game data... (${i}/${ZIP_PARTS})`);
          
          const response = await fetch(`game.zip.part${i}`);
          if (!response.ok) {
            throw new Error(`Failed to load ZIP part ${i}: ${response.status}`);
          }
          
          const buffer = await response.arrayBuffer();
          buffers.push(buffer);
        }
        
        // Merge buffers
        const totalLength = buffers.reduce((total, buf) => total + buf.byteLength, 0);
        const mergedBuffer = new Uint8Array(totalLength);
        
        let offset = 0;
        for (const buffer of buffers) {
          mergedBuffer.set(new Uint8Array(buffer), offset);
          offset += buffer.byteLength;
        }
        
        mergedZipBlob = new Blob([mergedBuffer], { type: 'application/zip' });
        mergedZipBlobUrl = URL.createObjectURL(mergedZipBlob);
        console.log('ZIP files merged successfully, blob URL created:', mergedZipBlobUrl);
        
        return mergedZipBlob;
      } catch (error) {
        console.error('Error merging ZIP files:', error);
        throw error;
      }
    }

    // Override fetch to intercept file requests
    function overrideFetchForFiles() {
      if (!mergedWasmBlob) {
        console.error('Merged WASM blob not available');
        return;
      }
      
      const originalFetch = window.fetch;
      
      window.fetch = function(input, init) {
        // Intercept requests for renpy.wasm
        if (typeof input === 'string' && input.includes('renpy.wasm') && !input.includes('.part')) {
          console.log('Intercepting fetch request for WASM:', input);
          
          return Promise.resolve(new Response(mergedWasmBlob, {
            status: 200,
            statusText: 'OK',
            headers: {
              'Content-Type': 'application/wasm',
              'Content-Length': mergedWasmBlob.size.toString()
            }
          }));
        }
        
        // Pass through all other requests
        return originalFetch.call(this, input, init);
      };
      
      console.log('Fetch override for WASM installed');
    }

    // Load scripts sequentially
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = () => resolve();
        script.onerror = (err) => reject(new Error(`Failed to load script: ${src}`));
        document.head.appendChild(script);
      });
    }

    // Override Ren'Py's gameZipURL before scripts load
    Object.defineProperty(window, 'gameZipURL', {
      get() {
        return mergedZipBlobUrl || 'game.zip';
      },
      set(value) {
        console.log('gameZipURL set to:', value);
      }
    });

    // Main initialization function
    async function initializeGame() {
      try {
        console.log('Initializing game with split files...');
        updateLoadingStatus('Starting initialization...');
        
        // Step 1: Merge WASM files
        await mergeWasmFiles();
        
        // Step 2: Merge ZIP files
        await mergeZipFiles();
        
        // Step 3: Override fetch to use merged WASM blob
        overrideFetchForFiles();
        
        // Step 4: Update the global gameZipURL to use our merged blob URL
        console.log('Setting gameZipURL to blob URL:', mergedZipBlobUrl);
        
        // Step 5: Load pre-script
        console.log('Loading pre-script...');
        updateLoadingStatus('Initializing game engine... (3/3)');
        await loadScript('renpy-pre.js');
        
        // Step 6: Load main script
        console.log('Loading main script...');
        await loadScript('renpy.js');
        
        console.log('All files loaded successfully');
        hideLoadingStatus();
        
      } catch (error) {
        console.error('Game initialization failed:', error);
        updateLoadingStatus(`Error: ${error.message}\nPlease refresh the page.`);
        throw error;
      }
    }

    // Patch Ren'Py's download functions if needed
    function patchRenpyFunctions() {
      // Store original functions
      const originalDownloadFile = window.downloadFile;
      const originalDownloadEngine = window.downloadEngine;
      
      if (originalDownloadFile) {
        window.downloadFile = function(url, onload, onerror) {
          console.log('downloadFile called with URL:', url);
          if (url === 'game.zip' && mergedZipBlobUrl) {
            console.log('Redirecting game.zip to blob URL');
            return originalDownloadFile.call(this, mergedZipBlobUrl, onload, onerror);
          }
          return originalDownloadFile.call(this, url, onload, onerror);
        };
      }
      
      if (originalDownloadEngine) {
        window.downloadEngine = function(url, onload, onerror) {
          console.log('downloadEngine called with URL:', url);
          if (url.includes('renpy.wasm') && mergedWasmBlob) {
            console.log('Using merged WASM blob for engine download');
            // Create a mock response with the blob
            const response = {
              status: 200,
              arrayBuffer: () => Promise.resolve(mergedWasmBlob)
            };
            onload(response);
            return;
          }
          return originalDownloadEngine.call(this, url, onload, onerror);
        };
      }
    }

    // Start initialization when page loads
    document.addEventListener('DOMContentLoaded', async function() {
      console.log('DOM loaded, starting game initialization...');
      
      try {
        await initializeGame();
        
        // Try to patch Ren'Py functions after loading
        setTimeout(patchRenpyFunctions, 1000);
      } catch (error) {
        console.error('Failed to initialize game:', error);
      }
    });

    // Original service worker registration
    if (navigator.serviceWorker) {
      if (!navigator.serviceWorker.controller) {
        navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'all' });
      }
    }
  </script>
</body>
